<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Universe ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Stars Background -->
    <div id="stars"></div>

    <!-- Welcome Screen -->
    <div class="content">

        <h1>A Sky Full of Us! 💫</h1>

        <p id="typing"></p>

        <button id="exploreBtn">
            Explore few of them!💌
        </button>

    </div>

    <!-- Memory Popup -->
    <div id="memoryModal" class="modal">

        <div class="modal-content">

            <span id="closeModal">&times;</span>

            <img id="memoryImage" src="" alt="Memory">

            <h2 id="memoryTitle"></h2>

            <p id="memoryText"></p>

            <button id="closeMemory">
                ❤️ Close
            </button>

            <div id="memoryCounter"></div>

        </div>

    </div>

    <!-- Hidden Planet -->
    <div id="planet">
        🪐
    </div>

    <!-- Final Chapter -->
    <div id="finalChapter">

        <div class="chapter-card">

            <h2 id="chapterTitle"></h2>

            <p id="finalLetter"></p>

            <img
                id="finalPhoto"
                src="photos/final-photo.jpeg"
                alt="Our Memory">

            <button id="playVoice">
                🎙️ There's one more thing...
            </button>

            <button id="showSurprise">
                🎁 One Last Surprise
            </button>

            <audio id="voiceAudio" preload="auto">
                <source src="audio/final-audio.m4a" type="audio/mp4">
            </audio>

            <div id="surpriseText">

                <h2>✨ One Last Thing...</h2>

                <p>
                    Your real surprise isn't on this page...
                    It's waiting for you in the real world!❤️
                </p>

            </div>

        </div>

    </div>

    <!-- Final Ending -->
    <div id="endingScreen">

        <div id="endingContent">

            <h1 id="endingTitle">
                ✨
            </h1>

            <p id="endingMessage">
                The universe made countless stars...
                <br><br>
                then made you!
            </p>

            <h2>
                😚❤️
            </h2>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
